<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle for versatility on any surface -->
  <rect x="10" y="10" width="380" height="380" rx="48" ry="48" fill="#0F172A"/>

  <!-- Subtle outer glow ring -->
  <circle cx="200" cy="165" r="105" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.2"/>

  <!-- Hub network: connection lines from center to outer nodes -->
  <!-- Top -->
  <line x1="200" y1="165" x2="200" y2="75" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>
  <!-- Top-right -->
  <line x1="200" y1="165" x2="278" y2="105" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>
  <!-- Bottom-right -->
  <line x1="200" y1="165" x2="278" y2="225" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>
  <!-- Bottom -->
  <line x1="200" y1="165" x2="200" y2="255" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>
  <!-- Bottom-left -->
  <line x1="200" y1="165" x2="122" y2="225" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>
  <!-- Top-left -->
  <line x1="200" y1="165" x2="122" y2="105" stroke="#2563EB" stroke-width="2.5" opacity="0.5"/>

  <!-- Secondary ring connections (node to node) -->
  <line x1="200" y1="75" x2="278" y2="105" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>
  <line x1="278" y1="105" x2="278" y2="225" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>
  <line x1="278" y1="225" x2="200" y2="255" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="255" x2="122" y2="225" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>
  <line x1="122" y1="225" x2="122" y2="105" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>
  <line x1="122" y1="105" x2="200" y2="75" stroke="#1E40AF" stroke-width="1.5" opacity="0.3"/>

  <!-- Outer nodes -->
  <circle cx="200" cy="75" r="8" fill="url(#logoGrad)"/>
  <circle cx="278" cy="105" r="8" fill="url(#logoGrad)"/>
  <circle cx="278" cy="225" r="8" fill="url(#logoGrad)"/>
  <circle cx="200" cy="255" r="8" fill="url(#logoGrad)"/>
  <circle cx="122" cy="225" r="8" fill="url(#logoGrad)"/>
  <circle cx="122" cy="105" r="8" fill="url(#logoGrad)"/>

  <!-- Outer node glows -->
  <circle cx="200" cy="75" r="14" fill="#2563EB" opacity="0.12"/>
  <circle cx="278" cy="105" r="14" fill="#2563EB" opacity="0.12"/>
  <circle cx="278" cy="225" r="14" fill="#2563EB" opacity="0.12"/>
  <circle cx="200" cy="255" r="14" fill="#2563EB" opacity="0.12"/>
  <circle cx="122" cy="225" r="14" fill="#2563EB" opacity="0.12"/>
  <circle cx="122" cy="105" r="14" fill="#2563EB" opacity="0.12"/>

  <!-- Center hub: large core node -->
  <circle cx="200" cy="165" r="28" fill="#0F172A" stroke="url(#logoGrad)" stroke-width="3"/>
  <circle cx="200" cy="165" r="18" fill="url(#logoGrad)"/>
  <!-- Inner pulse glow -->
  <circle cx="200" cy="165" r="36" fill="#2563EB" opacity="0.06"/>

  <!-- Brain/AI detail: small code brackets inside center node -->
  <text x="200" y="172" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="-1">&lt;/&gt;</text>

  <!-- Wordmark: AI Hub -->
  <text x="200" y="330" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#FFFFFF">
    <tspan fill="#2563EB">AI</tspan><tspan dx="6" fill="#E2E8F0">Hub</tspan>
  </text>

  <!-- Subtle tagline accent line -->
  <line x1="140" y1="345" x2="260" y2="345" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>